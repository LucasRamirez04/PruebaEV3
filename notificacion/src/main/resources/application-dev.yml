server:
  port: 8086

spring:
  application:
    name: microservicio-notificacion
  datasource:
    url: jdbc:h2:mem:db_404store_notificacion;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    preferIpAddress: true

logging:
  level:
    root: INFO
    _store.notificacion: INFO
  file:
    name: logs/notificacion.log