server:
  port: 8868

spring:
  application:
    name: microservicio-notificacion-test
  datasource:
    url: jdbc:h2:mem:db_notificacion_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true