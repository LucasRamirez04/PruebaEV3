server:
  port: 8090

spring:
  application:
    name: microservicio-devolucion
  datasource:
    url: jdbc:h2:mem:db_404store_devolucion;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

pedido-service:
  url: http://localhost:8083/api/store/pedidos
