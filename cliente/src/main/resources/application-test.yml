server:
  port: 8861 # Un puerto cualquiera solo para los tests

spring:
  application:
    name: microservicio-cliente-test
  datasource:
    # Base de datos en memoria limpia y exclusiva para pruebas
    url: jdbc:h2:mem:db_cliente_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true # Flyway sigue armando las tablas para que el test tenga donde mirar

app:
  jwt:
    secret: clave-secreta-jwt-test-123456
    expiration-ms: 3600000
