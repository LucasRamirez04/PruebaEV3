# Permite probar el contenedor de Reseña de forma aislada. Cuando el equipo
# integre los 10 microservicios + Eureka + Gateway, mover esto al
# docker-compose.yml general de la raíz del repositorio.
version: "3.9"

services:
  resena-db:
    image: mysql:8.0
    container_name: resena-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_404store_resena
    ports:
      - "3311:3306"
    volumes:
      - resena-db-data:/var/lib/mysql

  resena:
    build: .
    container_name: resena-service
    depends_on:
      - resena-db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://resena-db:3306/db_404store_resena
      DB_USERNAME: root
      DB_PASSWORD: root
      CLIENTE_SERVICE_URL: http://host.docker.internal:8081/api/store/clientes
      PRODUCTO_SERVICE_URL: http://host.docker.internal:8082/api/store/productos
      EUREKA_URL: http://host.docker.internal:8761/eureka
    ports:
      - "8089:8089"

volumes:
  resena-db-data:
