server:
  port: 8868

spring:
  application:
    name: resena-test
  datasource:
    url: jdbc:h2:mem:db_resena_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

cliente-service:
  url: http://localhost:8081/api/store/clientes

producto-service:
  url: http://localhost:8082/api/store/productos
