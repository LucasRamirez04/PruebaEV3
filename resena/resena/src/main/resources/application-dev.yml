server:
  port: 8086

spring:
  application:
    name: resena
  datasource:
    url: jdbc:h2:mem:db_404store_resena;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

cliente-service:
  url: http://localhost:8081/api/store/clientes

producto-service:
  url: http://localhost:8082/api/store/productos
