services:
  - type: web
    name: eureka-server
    env: docker
    plan: free
    region: oregon
    rootDir: ./eureka-server

  - type: web
    name: mi-microservicio-pedido
    env: docker
    plan: free
    region: oregon
    rootDir: ./pedido
    envVars:
      - key: PORT
        value: 8083
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: EUREKA_URL
        value: https://eureka-server-mg8f.onrender.com/eureka/

  - type: web
    name: api-gateway
    env: docker
    plan: free
    region: oregon
    rootDir: ./api-gateway
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: EUREKA_URL
        value: https://eureka-server-mg8f.onrender.com/eureka/